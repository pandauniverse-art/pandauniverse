<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LEE DEOK JUN | 3D Artist Portfolio</title>
    <style>
        :root { --main-bg: #050505; --accent: #fff; }
        body { background: var(--main-bg); color: #fff; margin: 0; font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        
        /* 쇼릴 배경 섹션 */
        .hero { height: 100vh; position: relative; overflow: hidden; }
        .hero iframe { 
            width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; opacity: 0.6;
        }
        .hero-title { 
            position: absolute; z-index: 10; width: 100%; text-align: center; top: 50%; 
            transform: translateY(-50%); letter-spacing: 10px;
        }

        /* 워크 그리드 */
        .section { padding: 80px 20px; max-width: 1400px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 30px; }
        .work-item { 
            position: relative; aspect-ratio: 16/9; background: #111; cursor: pointer; 
            overflow: hidden; border: 1px solid #222;
        }
        .work-item:hover .overlay { opacity: 1; }
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; opacity: 0; transition: 0.3s;
        }
    </style>
</head>
<body>

<section class="hero">
    <iframe src="https://www.youtube.com/embed/sxAyP7wK7DA?autoplay=1&mute=1&loop=1&playlist=sxAyP7wK7DA&controls=0" frameborder="0"></iframe>
    <div class="hero-title">
        <h1>LEE DEOK JUN</h1>
        <p>3D MOTION GRAPHIC ARTIST</p>
    </div>
</section>

<section id="work" class="section">
    <h2>WORKS</h2>
    <div class="grid" id="projectGrid">
        </div>
</section>

<script>
    // 구글 사이트의 WorkList 내용을 아래 배열에 추가하세요.
    const projects = [
        {
            title: "2025 Showreel",
            tools: "C4D / Octane / Redshift",
            thumb: "thumb_reel.webp", 
            link: "https://youtu.be/sxAyP7wK7DA"
        },
        {
            title: "Project Name 01",
            tools: "Unreal Engine / AE",
            thumb: "project01.webp",
            link: "#"
        }
    ];

    const grid = document.getElementById('projectGrid');
    projects.forEach(p => {
        grid.innerHTML += `
            <div class="work-item" onclick="window.open('${p.link}')" style="background-image:url(${p.thumb}); background-size:cover;">
                <div class="overlay">
                    <h3>${p.title}</h3>
                    <p>${p.tools}</p>
                </div>
            </div>
        `;
    });
</script>

</body>
</html>
