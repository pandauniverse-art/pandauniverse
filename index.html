<div onclick="openScienceModal()">
    <div class="card">
        <img src="images/25.03_Daejeon Science Festival/Daejeon Science_02.png" alt="대전 사이언스 페스티벌 썸네일">
    </div>
    <div class="card-info">
        <div class="card-title">대전 사이언스 페스티벌 (사이언스 오디세이)</div>
        <div class="card-tag">(주)에이플랜컴퍼니 | Media Art</div>
    </div>
</div>

<div id="scienceModal" class="full-modal" onclick="closeScienceModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeScienceModal()">CLOSE</span>
        
        <div class="video-container">
            <iframe id="scienceVideo" width="100%" height="100%" src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>

        <div class="project-detail-images">
            <h3>PROJECT IMAGES</h3>
            <div class="image-list" id="imageList">
                </div>
        </div>
    </div>
</div>

<style>
    /* 전용 모달 스타일 */
    .full-modal {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 3000; overflow-y: auto; padding: 60px 0;
    }
    .modal-content { width: 90%; max-width: 1400px; margin: 0 auto; }
    .video-container { width: 100%; aspect-ratio: 16/9; margin-bottom: 50px; background: #000; }
    
    .project-detail-images { margin-top: 80px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 40px; }
    .project-detail-images h3 { font-weight: 200; letter-spacing: 2px; margin-bottom: 30px; opacity: 0.5; }
    
    .image-list { display: flex; flex-direction: column; gap: 20px; }
    .image-list img { width: 100%; height: auto; display: block; border: 1px solid #111; }

    .close-btn { position: fixed; top: 30px; right: 50px; color: #fff; cursor: pointer; font-size: 0.8rem; letter-spacing: 2px; z-index: 3100; }
</style>

<script>
    function openScienceModal() {
        const modal = document.getElementById('scienceModal');
        const video = document.getElementById('scienceVideo');
        const list = document.getElementById('imageList');
        
        // 유튜브 링크에 autoplay=1과 사운드를 위해 mute=0(기본값) 설정
        video.src = "https://www.youtube.com/embed/a_dn_9OKv5I?autoplay=1&si=ZOAvHCXW-w7nh_pA";
        
        // 이미지 21장 동적 생성
        if(list.innerHTML === "") {
            for(let i=1; i<=21; i++) {
                const imgNum = i < 10 ? '0' + i : i;
                const img = document.createElement('img');
                img.src = `images/25.03_Daejeon Science Festival/Daejeon Science_${imgNum}.png`;
                img.loading = "lazy";
                list.appendChild(img);
            }
        }
        
        modal.style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeScienceModal() {
        const modal = document.getElementById('scienceModal');
        const video = document.getElementById('scienceVideo');
        
        video.src = ""; // 영상 정지
        modal.style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>
